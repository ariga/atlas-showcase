name: Sync Harbor
on:
  push:
    branches:
      - master
    paths:
      - 'dirs/harbor/*'
jobs:
  sync:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ariga/atlas-sync-action@2ca31f55e863b6736956424c5710862653813401 # v0
        with:
          dir: 'dirs/harbor'
          dir-format: golang-migrate
          driver: postgres
          cloud-public: true
          
