name: Sequelize TS CI

on:
  pull_request:
    paths:
      - 'projects/sequelize-ts/**'
      - '.github/workflows/sequelize-ts_ci.yaml'

permissions:
  contents: read
  pull-requests: write

jobs:
  schema-lint:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
      - name: Install dependencies
        working-directory: ./projects/sequelize-ts
        run: |
          npm ci --ignore-scripts=false
      - name: Set up Atlas CLI
        uses: ariga/setup-atlas@2f3c785c89a15e1c0d07bcae3900fb5feb969eea # v0
        with:
          cloud-token: ${{ secrets.ATLAS_CLOUD_TOKEN }}
      - name: Set up Atlas action
        uses: ariga/atlas-action/setup@54eb978c022091c1ebf9a3c90806f36a977fad03 # v1
      - name: Atlas Schema Lint
        uses: ariga/atlas-action/schema/lint@54eb978c022091c1ebf9a3c90806f36a977fad03 # v1
        with:
          working-directory: ./projects/sequelize-ts
          env: sequelize
          dev-url: 'sqlite://?mode=memory&_fk=1'
          url: 'env://url'